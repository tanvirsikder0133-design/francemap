<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find France Birthplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
        }

        .main-container {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 360px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        .title-wrapper {
            display: flex;
            align-items: baseline;
            margin-bottom: 12px;
            gap: 6px;
        }

        .find-text {
            color: #ff3b30;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .france-text {
            color: #007aff;
            font-weight: 500;
            font-size: 13px;
            opacity: 0.9;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            background-color: #fff;
            border: 2px solid transparent;
            border-radius: 20px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .search-input::placeholder {
            color: #a0aabf;
            font-weight: 400;
        }

        .search-input:focus {
            border-color: #007aff;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
        }

        .suggestions-box {
            position: absolute;
            top: 48px;
            left: 0;
            width: 100%;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            max-height: 240px;
            overflow-y: auto;
            display: none;
            z-index: 10;
            padding: 6px 0;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .suggestions-box::-webkit-scrollbar {
            width: 4px;
        }
        
        .suggestions-box::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .suggestion-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #475569;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .suggestion-item.active {
            background-color: #f0f7ff;
            color: #007aff;
            border-left: 3px solid #007aff;
            padding-left: 13px;
        }

        .suggestion-item:hover {
            background-color: #f8fafc;
        }

        .highlight {
            color: #007aff;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="title-wrapper">
            <span class="find-text">Find</span>
            <span class="france-text">France Birthplace</span>
        </div>

        <div class="search-wrapper">
            <input type="text" id="search-input" class="search-input" placeholder="Search for a city..." autocomplete="off">
            <div id="suggestions-box" class="suggestions-box"></div>
        </div>
    </div>

    <script>
        const places = [
            "Paris",
            "Marseille",
            "Lyon",
            "Toulouse",
            "Nice",
            "Nantes",
            "Strasbourg",
            "Montpellier",
            "Bordeaux",
            "Lille",
            "Rennes",
            "Reims",
            "Le Havre",
            "Saint-Étienne",
            "Toulon",
            "Grenoble",
            "Dijon",
            "Angers",
            "Nîmes",
            "Villeurbanne",
            "Abbessac",
            "Abbeville",
            "Abeancourt",
"Ablamville",
"Ableiges",
"Abloigos",
"Aboncourt",
"Achères",
"Açigné",
"Adrien",
"Agen",
"Ageux",
"Agny",
"Agon",
"Aguit",
"Agy",
"Ahun",
"Aillant",
"Aimab",
"Ain",
"Aincourt",
"Ainval",
"Airaines Calvados",
"Aire",
"Aires"
        ];

        const searchInput = document.getElementById('search-input');
        const suggestionsBox = document.getElementById('suggestions-box');
        let currentFocus = -1;

        searchInput.addEventListener('input', function() {
            const query = this.value.trim();
            const lowerQuery = query.toLowerCase();
            suggestionsBox.innerHTML = '';
            currentFocus = -1;

            if (query === '') {
                suggestionsBox.style.display = 'none';
                return;
            }

            const filteredPlaces = places.filter(place => 
                place.toLowerCase().startsWith(lowerQuery)
            );

            if (filteredPlaces.length > 0) {
                filteredPlaces.forEach(place => {
                    const div = document.createElement('div');
                    div.classList.add('suggestion-item');
                    
                    const matchLength = query.length;
                    const matchingText = place.substr(0, matchLength);
                    const remainingText = place.substr(matchLength);
                    
                    div.innerHTML = `<span class="highlight">${matchingText}</span>${remainingText}`;

                    div.addEventListener('click', function() {
                        searchInput.value = place;
                        suggestionsBox.style.display = 'none';
                    });

                    suggestionsBox.appendChild(div);
                });
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        searchInput.addEventListener('keydown', function(e) {
            let items = suggestionsBox.getElementsByClassName('suggestion-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentFocus++;
                addActive(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentFocus--;
                addActive(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (currentFocus > -1 && items[currentFocus]) {
                    items[currentFocus].click();
                }
            }
        });

        function addActive(items) {
            if (!items) return false;
            removeActive(items);
            
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            
            items[currentFocus].classList.add('active');
            searchInput.value = items[currentFocus].textContent;
            items[currentFocus].scrollIntoView({ block: 'nearest' });
        }

        function removeActive(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
            }
        }

        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });
    </script>

</body>
</html>
